name: CI-CD Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt
      - run: pytest

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
          -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/hello-mlops-app:${{ github.run_number }} .

      - name: Push Image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/hello-mlops-app:${{ github.run_number }}

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Staging Web App
        run: |
          az webapp config container set \
            --name ajay-mlops-webapp-docker-acr \
            --resource-group rg-mlops-demo \
            --docker-custom-image-name ${{ secrets.ACR_LOGIN_SERVER }}/hello-mlops-app:${{ github.run_number }} \
            --docker-registry-server-url https://${{ secrets.ACR_LOGIN_SERVER }}

          az webapp restart \
            --name ajay-mlops-webapp-docker-acr \
            --resource-group rg-mlops-demo

  deploy-production:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Production Web App
        run: |
          az webapp config container set \
            --name ajay-mlops-prod \
            --resource-group rg-mlops-demo \
            --docker-custom-image-name ${{ secrets.ACR_LOGIN_SERVER }}/hello-mlops-app:${{ github.run_number }} \
            --docker-registry-server-url https://${{ secrets.ACR_LOGIN_SERVER }}

          az webapp restart \
            --name ajay-mlops-prod \
            --resource-group rg-mlops-demo